name: Fetch Steam Data

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && format('Steam Data — manual ({0})', inputs.mode) ||
      github.event.schedule == '10 0 * * *'      && 'Steam Data — midnight unlock refresh' ||
      'Steam Data — 3h incremental' }}

on:
  schedule:
    - cron: '10 */3 * * *'  # every 3 hours at :10 — incremental
    - cron: '10 0 * * *'    # midnight UTC past 10 — unlock refresh
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        type: choice
        default: incremental
        options:
          - incremental
          - unlock-refresh
          - full-refresh

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_USER_ID: ${{ secrets.STEAM_USER_ID }}
        run: |
          if [ "${{ inputs.mode }}" = "full-refresh" ]; then
            echo "Mode: full refresh"
            npm run steam-fetch:full
          elif [ "${{ github.event.schedule }}" = "10 0 * * *" ] || [ "${{ inputs.mode }}" = "unlock-refresh" ]; then
            echo "Mode: unlock refresh"
            npm run steam-fetch:unlocked
          else
            echo "Mode: incremental"
            npm run steam-fetch
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/steam/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update steam data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
