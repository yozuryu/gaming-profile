name: Fetch RA Data

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && format('RA Data — manual ({0})', inputs.mode) ||
      github.event.schedule == '0 0 * * *'     && 'RA Data — midnight full refresh' ||
      'RA Data — 1h incremental' }}

on:
  schedule:
    - cron: '0 * * * *'    # every 1 hour — incremental
    - cron: '0 0 * * *'    # midnight UTC — full game refresh
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        type: choice
        default: incremental
        options:
          - incremental
          - full-refresh
          - watchlist-only

concurrency:
  group: data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          RA_USERNAME: ${{ secrets.RA_USERNAME }}
          RA_API_KEY: ${{ secrets.RA_API_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 0 * * *" ] || [ "${{ inputs.mode }}" = "full-refresh" ]; then
            echo "Mode: full game refresh"
            npm run ra-fetch:full
          elif [ "${{ inputs.mode }}" = "watchlist-only" ]; then
            echo "Mode: watchlist only"
            npm run ra-fetch:watchlist
          else
            echo "Mode: incremental"
            npm run ra-fetch
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ra/
          if [ "${{ github.event.schedule }}" = "0 0 * * *" ] || [ "${{ inputs.mode }}" = "full-refresh" ]; then
            MSG="chore: full refresh ra data $(date -u '+%Y-%m-%d %H:%M UTC')"
          elif [ "${{ inputs.mode }}" = "watchlist-only" ]; then
            MSG="chore: update ra watchlist $(date -u '+%Y-%m-%d %H:%M UTC')"
          else
            MSG="chore: update ra data $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "$MSG" && git push
