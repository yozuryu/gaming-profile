<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    { "imports": {
        "react":            "https://esm.sh/react@18.2.0",
        "react-dom":        "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
    } }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    body { background:#171a21; color:#c6d4df; font-family:'Segoe UI',Arial,sans-serif; }
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#171a21} ::-webkit-scrollbar-thumb{background:#2a475e;border-radius:3px}
    input,textarea,select{color-scheme:dark}
    .input { background:#202d39; border:1px solid #2a475e; border-radius:2px; padding:4px 8px; font-size:11px; color:#c6d4df; outline:none; width:100%; }
    .input:focus { border-color:#66c0f4; }
    .input::placeholder { color:#546270; }

    .btn-primary:disabled { background:#2a475e; color:#546270; cursor:not-allowed; }
    .btn-ghost { color:#546270; background:transparent; border:none; cursor:pointer; font-size:11px; transition:color .15s; }

<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';

const API       = 'http://localhost:3131/api';
const RA_MEDIA  = 'https://media.retroachievements.org';
const RA_SITE   = 'https://retroachievements.org';

// ── Generic fetch helpers ─────────────────────────────────────────────────────

const apiGet  = (url)        => fetch(url).then(r => r.json());
const apiData = (file)       => apiGet(`${API}/data?file=${encodeURIComponent(file)}`);
const apiSave = (file, data) => fetch(`${API}/data?file=${encodeURIComponent(file)}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
});

// ── Shared small components ───────────────────────────────────────────────────

const SectionHeader = ({ color = '#66c0f4', children }) => (
    <div className="flex items-center gap-2 mb-3">
        <span className="w-[3px] h-[14px] rounded-[1px] shrink-0" style={{ background: color }} />
        <span className="text-[13px] text-white tracking-wide uppercase font-medium">{children}</span>
    </div>
);

const SaveBar = ({ dirty, saving, saved, onSave }) => (
    <div className="flex items-center gap-3 px-4 py-2.5 border-b border-[#2a475e] bg-[#171a21]">
        <div className="flex-1" />
        {saved  && <span className="text-[10px] text-[#57cbde]">Saved</span>}
        {saving && <span className="text-[10px] text-[#546270]">Saving…</span>}
        <button className="btn-primary" onClick={onSave} disabled={!dirty || saving}>Save</button>
    </div>
);

function useSaver(file) {
    const [data,   setData]   = useState(null);
    const [dirty,  setDirty]  = useState(false);
    const [saving, setSaving] = useState(false);
    const [saved,  setSaved]  = useState(false);

    const load   = useCallback((d) => { setData(d); setDirty(false); setSaved(false); }, []);
    const update = useCallback((next) => { setData(next); setDirty(true); setSaved(false); }, []);

    const save = useCallback(async () => {
        setSaving(true);
        await apiSave(file, data);
        setSaving(false); setDirty(false); setSaved(true);
    }, [file, data]);

    return { data, load, update, dirty, saving, saved, save };
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Site Config
// ═══════════════════════════════════════════════════════════════════════════════

const TagList = ({ tags, onChange }) => {
    const [input, setInput] = useState('');
    const add = () => {
        const v = input.trim();
        if (v && !tags.includes(v)) { onChange([...tags, v]); }
        setInput('');
    };
    return (
        <div>
            <div className="flex flex-wrap gap-1 mb-1.5">
                {tags.map((t, i) => (
                    <span key={i} className="flex items-center gap-1 text-[10px] bg-[#202d39] border border-[#2a475e] rounded-[2px] px-1.5 py-0.5 text-[#c6d4df]">
                        {t}
                        <button className="btn-ghost btn-danger text-[12px] leading-none" onClick={() => onChange(tags.filter((_, j) => j !== i))}>×</button>
                    </span>
                ))}
            </div>
            <div className="flex gap-1">
                <input className="input flex-1" value={input} onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && add()} placeholder="Add tag…" />
                <button className="btn-primary shrink-0" onClick={add}>Add</button>
            </div>
        </div>
    );
};

const Toggle = ({ checked, onChange, label }) => (
    <label className="flex items-center gap-2 cursor-pointer select-none">
        <div
            className={`w-8 h-4 rounded-full transition-colors relative ${checked ? 'bg-[#66c0f4]' : 'bg-[#2a475e]'}`}
            onClick={() => onChange(!checked)}
        >
            <div className={`absolute top-0.5 w-3 h-3 rounded-full bg-white shadow transition-transform ${checked ? 'translate-x-4' : 'translate-x-0.5'}`} />
        </div>
        {label && <span className="text-[11px] text-[#8f98a0]">{label}</span>}
    </label>
);

const Field = ({ label, children }) => (
    <div className="flex flex-col gap-1">
        <label className="text-[9px] text-[#546270] uppercase tracking-[0.07em] font-semibold">{label}</label>
        {children}
    </div>
);

function SiteConfigModule() {
    const { data, load, update, dirty, saving, saved, save } = useSaver('data/hub/config.json');

    useEffect(() => {
        apiData('data/hub/config.json').then(d => load(d));
    }, []);

    if (!data || !data.tags) return <div className="p-6 text-[#546270] text-[11px]">Loading…</div>;

    const set = (path, val) => {
        const next = JSON.parse(JSON.stringify(data));
        const keys = path.split('.');
        let obj = next;
        keys.slice(0, -1).forEach(k => { obj = obj[k]; });
        obj[keys[keys.length - 1]] = val;
        update(next);
    };

    return (
        <div className="flex flex-col h-full">
            <SaveBar dirty={dirty} saving={saving} saved={saved} onSave={save} />
            <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6">

                {/* Identity */}
                <div>
                    <SectionHeader color="#e5b143">Identity</SectionHeader>
                    <div className="flex flex-col gap-3">
                        <Field label="Username">
                            <input className="input" value={data.username} onChange={e => set('username', e.target.value)} />
                        </Field>
                        <Field label="Motto">
                            <input className="input" value={data.motto} onChange={e => set('motto', e.target.value)} />
                        </Field>
                        <Field label="Site URL">
                            <input className="input" value={data.siteUrl} onChange={e => set('siteUrl', e.target.value)} />
                        </Field>
                    </div>
                </div>

                {/* Tags */}
                <div>
                    <SectionHeader color="#e5b143">Tags</SectionHeader>
                    <div className="flex flex-col gap-4">
                        {Object.entries(data.tags).map(([group, tags]) => (
                            <div key={group}>
                                <div className="flex items-center gap-2 mb-1.5">
                                    <span className="text-[11px] text-[#8f98a0] capitalize font-medium">{group}</span>
                                    <button className="btn-ghost btn-danger text-[11px]" onClick={() => {
                                        const next = { ...data.tags };
                                        delete next[group];
                                        set('tags', next);
                                    }}>Remove group</button>
                                </div>
                                <TagList tags={tags} onChange={v => set(`tags.${group}`, v)} />
                            </div>
                        ))}
                        <button className="btn-ghost text-left text-[11px] text-[#546270] hover:text-[#66c0f4]" onClick={() => {
                            const name = prompt('Group name (e.g. "genre"):');
                            if (name?.trim()) set('tags', { ...data.tags, [name.trim()]: [] });
                        }}>+ add tag group</button>
                    </div>
                </div>

                {/* Platforms */}
                <div>
                    <SectionHeader color="#e5b143">Platforms</SectionHeader>
                    <div className="flex flex-col gap-3">
                        {Object.entries(data.platforms).map(([key, cfg]) => (
                            <div key={key} className="flex items-center gap-4 bg-[#1b2838] border border-[#2a475e] rounded-[3px] px-3 py-2">
                                <span className="text-[11px] text-white capitalize font-medium w-[140px] shrink-0">{key}</span>
                                <Toggle checked={cfg.visible} onChange={v => set(`platforms.${key}.visible`, v)} label="Visible" />
                                <Toggle checked={cfg.active}  onChange={v => set(`platforms.${key}.active`,  v)} label="Active" />
                            </div>
                        ))}
                    </div>
                </div>

                {/* Pages */}
                <div>
                    <SectionHeader color="#e5b143">Pages</SectionHeader>
                    <div className="flex flex-col gap-3">
                        {['activity', 'completions'].map(page => (
                            <div key={page} className="flex items-center gap-4 bg-[#1b2838] border border-[#2a475e] rounded-[3px] px-3 py-2">
                                <span className="text-[11px] text-white capitalize font-medium w-[140px] shrink-0">{page}</span>
                                <Toggle checked={data[page]?.visible ?? true} onChange={v => set(`${page}.visible`, v)} label="Visible" />
                            </div>
                        ))}
                    </div>
                </div>

            </div>
        </div>
    );
}

// MODULE: RA Guides
// ═══════════════════════════════════════════════════════════════════════════════

const ALLOWED_CATEGORIES = ['Guides', 'Videos'];
const CATEGORY_ICON = { Guides: '📖', Videos: '▶️' };

const CategoryEditor = ({ cat, onChange, onDelete }) => {
    const addLink = () => onChange({ ...cat, links: [...cat.links, { label: '', url: '' }] });
    const updateLink = (i, field, val) => onChange({ ...cat, links: cat.links.map((l, idx) => idx === i ? { ...l, [field]: val } : l) });
    const removeLink = (i) => onChange({ ...cat, links: cat.links.filter((_, idx) => idx !== i) });

    return (
        <div className="border border-[#2a475e] rounded-[3px] bg-[#1b2838]">
            <div className="flex items-center gap-2 px-3 py-2 border-b border-[#2a475e]">
                <span className="text-[11px]">{CATEGORY_ICON[cat.category] ?? '🔗'}</span>
                <span className="text-[12px] font-medium text-white flex-1">{cat.category}</span>
                <button className="btn-ghost btn-danger text-[16px] leading-none" onClick={onDelete}>×</button>
            </div>
            <div className="flex flex-col gap-1 p-2">
                {cat.links.map((link, i) => (
                    <div key={i} className="flex items-center gap-1.5">
                        <input value={link.label} onChange={e => updateLink(i, 'label', e.target.value)}
                            placeholder="Label" className="input w-[120px] shrink-0" />
                        <input value={link.url} onChange={e => updateLink(i, 'url', e.target.value)}
                            placeholder="URL" className="input flex-1" />
                        {link.url && <a href={link.url} target="_blank" rel="noreferrer" className="btn-ghost text-[12px] shrink-0">↗</a>}
                        <button className="btn-ghost btn-danger text-[16px] leading-none shrink-0" onClick={() => removeLink(i)}>×</button>
                    </div>
                ))}
                <button className="btn-ghost text-left mt-1" onClick={addLink}>+ add link</button>
            </div>
        </div>
    );
};

function RAGuidesModule() {
    const [games,    setGames]    = useState([]);
    const [search,   setSearch]   = useState('');
    const [selected, setSelected] = useState(null);
    const [guides,   setGuides]   = useState(null);
    const [cats,     setCats]     = useState([]);
    const [dirty,    setDirty]    = useState(false);
    const [saving,   setSaving]   = useState(false);
    const [saved,    setSaved]    = useState(false);

    useEffect(() => {
        Promise.all([
            apiGet(`${API}/games/ra`),
            apiData('data/ra/guides.json'),
        ]).then(([g, gd]) => { setGames(g); setGuides(gd); });
    }, []);

    useEffect(() => {
        if (!selected || !guides) return;
        setCats(guides[selected.id] ? JSON.parse(JSON.stringify(guides[selected.id])) : []);
        setDirty(false); setSaved(false);
    }, [selected?.id, guides]);

    const save = async () => {
        setSaving(true);
        const next = { ...guides };
        if (cats.length === 0) delete next[selected.id]; else next[selected.id] = cats;
        await apiSave('data/ra/guides.json', next);
        setGuides(next); setSaving(false); setDirty(false); setSaved(true);
    };

    const update = (next) => { setCats(next); setDirty(true); setSaved(false); };

    const filtered = search
        ? games.filter(g => g.title.toLowerCase().includes(search.toLowerCase()) || String(g.id).includes(search))
        : games;

    const customCount = guides ? Object.keys(guides).filter(k => k !== '_example').length : 0;

    return (
        <div className="flex h-full overflow-hidden">
            {/* Sidebar */}
            <div className="w-[240px] shrink-0 flex flex-col border-r border-[#2a475e]">
                <div className="px-3 pt-3 pb-2 border-b border-[#2a475e]">
                    <input value={search} onChange={e => setSearch(e.target.value)}
                        placeholder="Search games…" className="input" />
                </div>
                <div className="flex-1 overflow-y-auto py-1">
                    {filtered.map(g => {
                        const hasCustom = guides && !!guides[g.id];
                        const isSel = selected?.id === g.id;
                        return (
                            <button key={g.id} onClick={() => setSelected(g)}
                                className={`w-full flex items-center gap-2 px-3 py-1.5 text-left transition-colors ${isSel ? 'bg-[#2a475e]' : 'hover:bg-[#1b2838]'}`}>
                                <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-6 h-6 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                <span className={`text-[11px] flex-1 truncate ${isSel ? 'text-white' : 'text-[#8f98a0]'}`}>{g.title}</span>
                                {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                {hasCustom && <span className="w-1.5 h-1.5 rounded-full bg-[#e5b143] shrink-0" />}
                            </button>
                        );
                    })}
                    {filtered.length === 0 && <div className="text-[11px] text-[#546270] text-center py-6">No games found</div>}
                </div>
                <div className="px-3 py-2 border-t border-[#2a475e] text-[10px] text-[#546270]">
                    {customCount} games with custom guides · <span className="text-[#e5b143]">●</span> = has guides · <span className="text-[#66c0f4]">WL</span> = watchlist only
                </div>
            </div>

            {/* Detail */}
            <div className="flex-1 flex flex-col overflow-hidden">
                {!selected ? (
                    <div className="flex items-center justify-center h-full text-[#546270] text-[12px]">Select a game</div>
                ) : (
                    <>
                        {/* Game header */}
                        <div className="flex items-center gap-3 px-4 py-3 border-b border-[#2a475e]">
                            <img src={`${RA_MEDIA}${selected.imageIcon}`} alt={selected.title}
                                className="w-10 h-10 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                            <div className="flex-1 min-w-0">
                                <div className="text-[13px] text-white font-medium truncate">{selected.title}</div>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="text-[10px] text-[#546270]">ID: {selected.id}</span>
                                    <a href={`https://gamefaqs.gamespot.com/search?game=${encodeURIComponent(selected.title)}`} target="_blank" rel="noreferrer"
                                        className="text-[10px] text-[#546270] hover:text-[#66c0f4] transition-colors">Search GameFAQs ↗</a>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 shrink-0">
                                {saved  && <span className="text-[10px] text-[#57cbde]">Saved</span>}
                                <button className="btn-primary" onClick={save} disabled={!dirty || saving}>
                                    {saving ? 'Saving…' : 'Save'}
                                </button>
                            </div>
                        </div>

                        {/* Categories */}
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                            {cats.length === 0 && (
                                <div className="text-[11px] text-[#546270] text-center py-4">No custom guides — fallback links will be shown.</div>
                            )}
                            {cats.map((cat, i) => (
                                <CategoryEditor key={i} cat={cat}
                                    onChange={next => update(cats.map((c, idx) => idx === i ? next : c))}
                                    onDelete={() => update(cats.filter((_, idx) => idx !== i))} />
                            ))}
                            {ALLOWED_CATEGORIES.filter(c => !cats.some(cat => cat.category === c)).map(c => (
                                <button key={c} onClick={() => update([...cats, { category: c, links: [{ label: '', url: '' }] }])}
                                    className="w-full py-2 border border-dashed border-[#2a475e] hover:border-[#66c0f4] rounded-[3px] text-[11px] text-[#546270] hover:text-[#66c0f4] transition-colors">
                                    + add {c}
                                </button>
                            ))}
                        </div>
                    </>
                )}
            </div>
        </div>
    );
}

// modal: null | { mode: 'add' | 'rename' | 'delete', id?: string, initialValue?: string, suggestedGameIds?: number[] }
function SeriesModal({ mode, seriesName, initialValue, onConfirm, onCancel }) {
    const [value, setValue] = useState(mode === 'rename' ? seriesName : (initialValue ?? ''));
    const inputRef = useRef(null);

    useEffect(() => {
        inputRef.current?.focus();
        inputRef.current?.select();
    }, []);

    const onKey = (e) => {
        if (e.key === 'Enter' && (mode === 'delete' || value.trim())) onConfirm(value.trim());
        if (e.key === 'Escape') onCancel();
    };

    return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" onKeyDown={onKey}>
            <div className="absolute inset-0 bg-black/60" onClick={onCancel} />
            <div className="relative z-10 bg-[#1b2838] border border-[#2a475e] rounded-[3px] shadow-xl w-[320px] flex flex-col">
                <div className="flex items-center justify-between px-4 py-3 border-b border-[#2a475e]">
                    <span className="text-[12px] text-white font-medium">
                        {mode === 'add' ? 'New Series' : mode === 'rename' ? 'Rename Series' : 'Delete Series'}
                    </span>
                    <button className="btn-ghost text-[16px] leading-none" onClick={onCancel}>×</button>
                </div>
                <div className="px-4 py-4 flex flex-col gap-3">
                    {mode === 'delete' ? (
                        <p className="text-[12px] text-[#8f98a0]">
                            Delete <span className="text-white font-medium">"{seriesName}"</span>? This cannot be undone.
                        </p>
                    ) : (
                        <input ref={inputRef} className="input" value={value} onChange={e => setValue(e.target.value)}
                            placeholder="Series name…" />
                    )}
                    <div className="flex justify-end gap-2">
                        <button className="btn-ghost" onClick={onCancel}>Cancel</button>
                        {mode === 'delete'
                            ? <button className="btn-primary" style={{background:'#c0392b'}}
                                onClick={() => onConfirm()}>Delete</button>
                            : <button className="btn-primary" disabled={!value.trim()}
                                onClick={() => onConfirm(value.trim())}>
                                {mode === 'add' ? 'Create' : 'Rename'}
                              </button>
                        }
                    </div>
                </div>
            </div>
        </div>
    );
}

// Sort key: symbols first (0), numbers second (1), letters last (2)
const seriesSortKey = name => {
    if (/^[a-zA-Z]/.test(name)) return '2' + name.toLowerCase();
    if (/^\d/.test(name))       return '1' + name.toLowerCase();
    return                             '0' + name.toLowerCase();
};

// Derive a "series key" from a game title by stripping subtitles and trailing numbers/roman numerals
function seriesKey(title) {
    let s = title;
    s = s.replace(/\[.*?\]/g, '');   // [Subset - ...], [E3 Preview], etc.
    s = s.replace(/~[^~]+~/g, '');   // ~Tag~
    s = s.replace(/\s*:\s+.*$/, ''); // ": subtitle"
    s = s.replace(/\s+(XIV|XIII|XII|XI|IX|VIII|VII|VI|IV|III|II|I|XVI|XV|X|V)\s*$/i, '');
    s = s.replace(/\s+\d+(\s*[&]\s*\d+)?\s*$/, '');
    s = s.replace(/[:\-,]+$/, '').trim();
    s = s.replace(/[^a-zA-Z0-9\s]/g, '').trim(); // strip remaining symbols (keep alphanumeric + spaces)
    return s.toLowerCase();
}

function toTitleCase(s) {
    const minor = new Set(['a','an','the','of','in','on','at','and','but','or','for','nor','to']);
    return s.replace(/\S+/g, (w, i) => (i === 0 || !minor.has(w)) ? w[0].toUpperCase() + w.slice(1) : w);
}

function computeRecommendations(allGames, series) {
    const assignedIds = new Set((series || []).flatMap(s => s.gameIds));
    const unassigned  = allGames.filter(g => !assignedIds.has(g.id));
    const groupMap    = new Map();
    unassigned.forEach(g => {
        const key = seriesKey(g.title);
        if (key.length < 4) return;
        if (!groupMap.has(key)) groupMap.set(key, new Map());
        groupMap.get(key).set(g.id, g); // dedupe by id
    });
    return Array.from(groupMap.entries())
        .map(([key, gMap]) => ({ name: toTitleCase(key), games: Array.from(gMap.values()) }))
        .filter(r => r.games.length >= 3)
        .sort((a, b) => b.games.length - a.games.length);
}

function RASeriesModule() {
    const [allGames,        setAllGames]        = useState([]);
    const [series,          setSeries]          = useState(null);
    const [selectedId,      setSelectedId]      = useState(null);
    const [dirty,           setDirty]           = useState(false);
    const [saving,          setSaving]          = useState(false);
    const [saved,           setSaved]           = useState(false);
    const [gameSearch,      setGameSearch]      = useState('');
    const [listSearch,      setListSearch]      = useState('');
    const [addSearch,       setAddSearch]       = useState('');
    const [modal,           setModal]           = useState(null);
    const [showSuggestions,  setShowSuggestions]  = useState(false);
    const [showUnassigned,   setShowUnassigned]   = useState(false);
    const [unassignedSearch, setUnassignedSearch] = useState('');

    useEffect(() => {
        Promise.all([
            apiGet(`${API}/games/ra`),
            apiData('data/ra/series.json'),
        ]).then(([g, s]) => {
            setAllGames(g);
            setSeries((Array.isArray(s) ? s : []).sort((a, b) => seriesSortKey(a.name).localeCompare(seriesSortKey(b.name))));
        });
    }, []);

    const selected = series?.find(s => s.id === selectedId) ?? null;

    const save = async () => {
        setSaving(true);
        await apiSave('data/ra/series.json', series);
        setSaving(false); setDirty(false); setSaved(true);
    };

    const update = (next) => { setSeries(next); setDirty(true); setSaved(false); };

    const handleModalConfirm = (value) => {
        const { mode, id, suggestedGameIds } = modal;
        if (mode === 'add') {
            const newEntry = { id: Date.now().toString(36), name: value, gameIds: suggestedGameIds ?? [] };
            update([...(series || []), newEntry].sort((a, b) => seriesSortKey(a.name).localeCompare(seriesSortKey(b.name))));
            setSelectedId(newEntry.id);
            setShowSuggestions(false);
            setShowUnassigned(false);
            setAddSearch('');
        } else if (mode === 'rename') {
            update(series.map(s => s.id === id ? { ...s, name: value } : s).sort((a, b) => seriesSortKey(a.name).localeCompare(seriesSortKey(b.name))));
        } else if (mode === 'delete') {
            const next = series.filter(s => s.id !== id);
            update(next);
            if (selectedId === id) setSelectedId(null);
            apiSave('data/ra/series.json', next);
        }
        setModal(null);
    };

    const addGame = (gameId) => {
        if (!selected || selected.gameIds.includes(gameId)) return;
        update(series.map(s => s.id === selectedId ? { ...s, gameIds: [...s.gameIds, gameId] } : s));
    };

    const removeGame = (gameId) => {
        update(series.map(s => s.id === selectedId ? { ...s, gameIds: s.gameIds.filter(id => id !== gameId) } : s));
    };

    const gameMap = Object.fromEntries(allGames.map(g => [g.id, g]));

    const filteredList = (series || []).filter(s =>
        !listSearch || s.name.toLowerCase().includes(listSearch.toLowerCase())
    );

    const assignedIds = new Set(selected?.gameIds ?? []);
    const addCandidates = allGames.filter(g =>
        !assignedIds.has(g.id) &&
        (!addSearch || g.title.toLowerCase().includes(addSearch.toLowerCase()))
    );

    const filteredAssigned = (selected?.gameIds ?? [])
        .map(id => gameMap[id])
        .filter(g => g && (!gameSearch || g.title.toLowerCase().includes(gameSearch.toLowerCase())));

    const recommendations  = series ? computeRecommendations(allGames, series) : [];
    const allAssignedIds   = new Set((series || []).flatMap(s => s.gameIds));
    const allUnassigned    = allGames.filter(g => !allAssignedIds.has(g.id));
    const filteredUnassigned = unassignedSearch
        ? allUnassigned.filter(g => g.title.toLowerCase().includes(unassignedSearch.toLowerCase()))
        : allUnassigned;

    // Games not assigned to THIS series whose seriesKey overlaps with this series' key (bidirectional prefix)
    const selectedKey = selected ? seriesKey(selected.name) : '';
    const seriesSuggestions = selected
        ? allGames.filter(g => {
            if (assignedIds.has(g.id)) return false;
            const gKey = seriesKey(g.title);
            if (gKey === selectedKey) return true;
            // game key is longer: "summon night swordcraft story 2" matches series "summon night swordcraft story"
            if (gKey.startsWith(selectedKey + ' ')) return true;
            // game key is shorter: "summon night" (from "Summon Night: Swordcraft Story") matches series "summon night swordcraft story"
            if (selectedKey.startsWith(gKey + ' ') || selectedKey === gKey) return true;
            return false;
          })
        : [];

    if (!series) return <div className="p-6 text-[#546270] text-[11px]">Loading…</div>;

    const modalSeries = modal?.id ? series.find(s => s.id === modal.id) : null;

    return (
        <div className="flex h-full overflow-hidden relative">
            {modal && (
                <SeriesModal
                    mode={modal.mode}
                    seriesName={modalSeries?.name ?? ''}
                    initialValue={modal.initialValue}
                    onConfirm={handleModalConfirm}
                    onCancel={() => setModal(null)}
                />
            )}

            {/* ── Left: series list ── */}
            <div className="w-[220px] shrink-0 flex flex-col border-r border-[#2a475e]">
                <div className="px-3 pt-3 pb-2 border-b border-[#2a475e] flex flex-col gap-2">
                    <input value={listSearch} onChange={e => setListSearch(e.target.value)}
                        placeholder="Search series…" className="input" />
                    <button className="btn-primary w-full" onClick={() => setModal({ mode: 'add' })}>+ New Series</button>
                </div>
                <div className="flex-1 overflow-y-auto py-1">
                    {filteredList.map(s => {
                        const isSel = s.id === selectedId && !showSuggestions && !showUnassigned;
                        return (
                            <button key={s.id} onClick={() => { setSelectedId(s.id); setShowSuggestions(false); setShowUnassigned(false); setAddSearch(''); setGameSearch(''); }}
                                className={`w-full flex items-center gap-2 px-3 py-1.5 text-left transition-colors ${isSel ? 'bg-[#2a475e]' : 'hover:bg-[#1b2838]'}`}>
                                <span className={`text-[11px] flex-1 truncate ${isSel ? 'text-white' : 'text-[#8f98a0]'}`}>{s.name}</span>
                                <span className="text-[9px] text-[#546270] shrink-0">{s.gameIds.length}</span>
                            </button>
                        );
                    })}
                    {filteredList.length === 0 && !showSuggestions && !showUnassigned && <div className="text-[11px] text-[#546270] text-center py-6">No series yet</div>}
                </div>
                <div className="px-3 py-2 border-t border-[#2a475e] flex items-center gap-2">
                    <span className="text-[10px] text-[#546270] flex-1">
                        {series.length} series · {series.reduce((n, s) => n + s.gameIds.length, 0)} assigned
                    </span>
                    {allUnassigned.length > 0 && (
                        <button
                            onClick={() => { if (showUnassigned) { setShowUnassigned(false); } else { setShowUnassigned(true); setShowSuggestions(false); setSelectedId(null); setUnassignedSearch(''); } }}
                            className={`flex items-center gap-1 text-[9px] font-semibold px-2 py-[3px] rounded-[2px] border transition-colors ${showUnassigned ? 'bg-[#8f98a0] text-[#101214] border-[#8f98a0]' : 'text-[#8f98a0] border-[#8f98a0]/40 hover:border-[#8f98a0]'}`}>
                            📋 {allUnassigned.length}
                        </button>
                    )}
                    {recommendations.length > 0 && (
                        <button
                            onClick={() => { if (showSuggestions) { setShowSuggestions(false); } else { setShowSuggestions(true); setShowUnassigned(false); } }}
                            className={`flex items-center gap-1 text-[9px] font-semibold px-2 py-[3px] rounded-[2px] border transition-colors ${showSuggestions ? 'bg-[#e5b143] text-[#101214] border-[#e5b143]' : 'text-[#e5b143] border-[#e5b143]/40 hover:border-[#e5b143]'}`}>
                            💡 {recommendations.length}
                        </button>
                    )}
                </div>
            </div>

            {/* ── Right: editor, unassigned, or suggestions ── */}
            <div className="flex-1 flex flex-col overflow-hidden">
                {showUnassigned ? (
                    <>
                        <div className="flex items-center gap-3 px-4 py-3 border-b border-[#2a475e]">
                            <span className="text-[13px] text-white font-medium flex-1">Unassigned — {allUnassigned.length} game{allUnassigned.length !== 1 ? 's' : ''}</span>
                            <button className="btn-ghost text-[11px]" onClick={() => setShowUnassigned(false)}>← Back</button>
                        </div>
                        <div className="px-3 py-2 border-b border-[#2a475e]">
                            <input value={unassignedSearch} onChange={e => setUnassignedSearch(e.target.value)}
                                placeholder="Search unassigned games…" className="input" />
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {filteredUnassigned.length === 0 && (
                                <div className="text-[11px] text-[#546270] text-center py-6">
                                    {unassignedSearch ? 'No matches' : 'All games are assigned to a series!'}
                                </div>
                            )}
                            {filteredUnassigned.map(g => (
                                <div key={g.id} className="flex items-center gap-2 px-3 py-1.5 hover:bg-[#1b2838] border-b border-[#1a2535]">
                                    <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-6 h-6 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                    <a href={`${RA_SITE}/game/${g.id}`} target="_blank" rel="noreferrer" className="text-[11px] text-[#c6d4df] hover:text-[#66c0f4] flex-1 truncate transition-colors" onClick={e => e.stopPropagation()}>{g.title}</a>
                                    {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                    <button className="btn-primary shrink-0 text-[9px] py-[2px] px-2 whitespace-nowrap"
                                        onClick={() => setModal({ mode: 'add', initialValue: g.title, suggestedGameIds: [g.id] })}>
                                        New Series
                                    </button>
                                </div>
                            ))}
                        </div>
                    </>
                ) : showSuggestions ? (
                    <>
                        <div className="flex items-center gap-3 px-4 py-3 border-b border-[#2a475e]">
                            <span className="text-[13px] text-white font-medium flex-1">Suggestions — {recommendations.length} potential series</span>
                            <button className="btn-ghost text-[11px]" onClick={() => setShowSuggestions(false)}>← Back</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                            <p className="text-[10px] text-[#546270]">
                                Games not yet in any series, grouped by shared name prefix. Click <strong className="text-[#8f98a0]">Create Series</strong> to add one — games will be pre-assigned.
                            </p>
                            {recommendations.map((rec, i) => (
                                <div key={i} className="border border-[#2a475e] rounded-[3px] bg-[#1b2838]">
                                    <div className="flex items-center gap-3 px-3 py-2 border-b border-[#2a475e]">
                                        <span className="text-[12px] text-white font-medium flex-1 truncate">{rec.name}</span>
                                        <span className="text-[9px] text-[#546270] shrink-0">{rec.games.length} games</span>
                                        <button className="btn-primary shrink-0 text-[10px] py-[3px]"
                                            onClick={() => setModal({ mode: 'add', initialValue: rec.name, suggestedGameIds: rec.games.map(g => g.id) })}>
                                            Create Series
                                        </button>
                                    </div>
                                    <div className="p-2 flex flex-col gap-0">
                                        {rec.games.map(g => (
                                            <div key={g.id} className="flex items-center gap-2 px-1 py-1">
                                                <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-5 h-5 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                                <a href={`${RA_SITE}/game/${g.id}`} target="_blank" rel="noreferrer" className="text-[11px] text-[#8f98a0] hover:text-[#66c0f4] truncate flex-1 transition-colors">{g.title}</a>
                                                {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </>
                ) : !selected ? (
                    <div className="flex items-center justify-center h-full text-[#546270] text-[12px]">Select a series</div>
                ) : (
                    <>
                        {/* Header */}
                        <div className="flex items-center gap-3 px-4 py-3 border-b border-[#2a475e]">
                            <span className="text-[13px] text-white font-medium flex-1 truncate">{selected.name}</span>
                            <button className="btn-ghost text-[11px]" onClick={() => setModal({ mode: 'rename', id: selected.id })}>Rename</button>
                            <button className="btn-ghost btn-danger text-[11px]" onClick={() => setModal({ mode: 'delete', id: selected.id })}>Delete</button>
                            <span className="text-[#2a475e]">|</span>
                            {saved  && <span className="text-[10px] text-[#57cbde]">Saved</span>}
                            <button className="btn-primary" onClick={save} disabled={!dirty || saving}>
                                {saving ? 'Saving…' : 'Save'}
                            </button>
                        </div>

                        <div className="flex flex-1 overflow-hidden">
                            {/* Assigned games */}
                            <div className="flex-1 flex flex-col overflow-hidden border-r border-[#2a475e]">
                                <div className="px-3 py-2 border-b border-[#2a475e] flex items-center gap-2">
                                    <span className="text-[10px] text-[#8f98a0] font-semibold uppercase tracking-wider flex-1">
                                        Assigned — {selected.gameIds.length} game{selected.gameIds.length !== 1 ? 's' : ''}
                                    </span>
                                    <input value={gameSearch} onChange={e => setGameSearch(e.target.value)}
                                        placeholder="Filter…" className="input w-[120px]" />
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {filteredAssigned.length === 0 && (
                                        <div className="text-[11px] text-[#546270] text-center py-6">
                                            {selected.gameIds.length === 0 ? 'No games assigned yet' : 'No matches'}
                                        </div>
                                    )}
                                    {filteredAssigned.map(g => (
                                        <div key={g.id} className="flex items-center gap-2 px-3 py-1.5 hover:bg-[#1b2838] border-b border-[#1a2535] group">
                                            <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-6 h-6 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                            <a href={`${RA_SITE}/game/${g.id}`} target="_blank" rel="noreferrer" className="text-[11px] text-[#c6d4df] hover:text-[#66c0f4] flex-1 truncate transition-colors" onClick={e => e.stopPropagation()}>{g.title}</a>
                                            {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                            <button className="btn-ghost btn-danger opacity-0 group-hover:opacity-100 transition-opacity text-[16px] leading-none shrink-0"
                                                onClick={() => removeGame(g.id)}>×</button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Add games panel */}
                            <div className="w-[280px] shrink-0 flex flex-col overflow-hidden">
                                <div className="px-3 py-2 border-b border-[#2a475e]">
                                    <input value={addSearch} onChange={e => setAddSearch(e.target.value)}
                                        placeholder="Search to add…" className="input" />
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {addSearch === '' && seriesSuggestions.length > 0 && (
                                        <>
                                            <div className="px-3 py-1.5 bg-[#172333] border-b border-[#2a475e] flex items-center gap-1.5">
                                                <span className="text-[9px] font-semibold uppercase tracking-wider text-[#e5b143]">Suggested</span>
                                                <span className="text-[9px] text-[#546270]">{seriesSuggestions.length} possible match{seriesSuggestions.length !== 1 ? 'es' : ''}</span>
                                            </div>
                                            {seriesSuggestions.map(g => (
                                                <button key={g.id} onClick={() => addGame(g.id)}
                                                    className="w-full flex items-center gap-2 px-3 py-1.5 hover:bg-[#1b2838] border-b border-[#1a2535] border-l-2 border-l-[#e5b143]/40 text-left">
                                                    <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-6 h-6 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                                    <a href={`${RA_SITE}/game/${g.id}`} target="_blank" rel="noreferrer" className="text-[11px] text-[#c6d4df] hover:text-[#66c0f4] flex-1 truncate transition-colors" onClick={e => e.stopPropagation()}>{g.title}</a>
                                                    {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                                    <span className="text-[11px] text-[#e5b143]/60 shrink-0">+</span>
                                                </button>
                                            ))}
                                            <div className="px-3 py-1.5 bg-[#172333] border-b border-[#2a475e]">
                                                <span className="text-[9px] font-semibold uppercase tracking-wider text-[#546270]">Search</span>
                                            </div>
                                            <div className="text-[11px] text-[#546270] text-center py-3">Type to search all games</div>
                                        </>
                                    )}
                                    {addSearch === '' && seriesSuggestions.length === 0 && (
                                        <div className="text-[11px] text-[#546270] text-center py-4">Type to search games</div>
                                    )}
                                    {addSearch !== '' && addCandidates.length === 0 && (
                                        <div className="text-[11px] text-[#546270] text-center py-4">No matches</div>
                                    )}
                                    {addSearch !== '' && addCandidates.map(g => (
                                        <button key={g.id} onClick={() => addGame(g.id)}
                                            className="w-full flex items-center gap-2 px-3 py-1.5 hover:bg-[#1b2838] border-b border-[#1a2535] text-left">
                                            <img src={`${RA_MEDIA}${g.imageIcon}`} alt="" className="w-6 h-6 rounded-[2px] border border-[#101214] object-cover bg-black shrink-0" />
                                            <a href={`${RA_SITE}/game/${g.id}`} target="_blank" rel="noreferrer" className="text-[11px] text-[#8f98a0] hover:text-[#66c0f4] flex-1 truncate transition-colors" onClick={e => e.stopPropagation()}>{g.title}</a>
                                            {g.fromWatchlist && <span className="text-[8px] text-[#66c0f4] border border-[#66c0f4]/30 px-1 py-[1px] rounded-[2px] shrink-0 leading-none">WL</span>}
                                            <span className="text-[11px] text-[#546270] shrink-0">+</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </>
                )}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Pipelines
// ═══════════════════════════════════════════════════════════════════════════════

const PIPELINE_MODES = [
    { platform: 'RetroAchievements', color: '#e5b143', modes: [
        { id: 'ra',            label: 'Incremental',    desc: 'Profile + recent achievements' },
        { id: 'ra-watchlist',  label: 'Watchlist Only', desc: 'Fetch want-to-play list only' },
        { id: 'ra-full',       label: 'Full Refresh',   desc: 'Re-fetch all game details' },
        { id: 'ra-debug',      label: 'Debug',          desc: 'Print API responses, no writes' },
    ]},
    { platform: 'Steam', color: '#66c0f4', modes: [
        { id: 'steam',            label: 'Incremental',         desc: 'Recently played only' },
        { id: 'steam-unlocked',   label: 'Refresh Unlocked',    desc: 'Re-fetch games with unlocks' },
        { id: 'steam-full',       label: 'Full Refresh',        desc: 'All owned games' },
        { id: 'steam-debug',      label: 'Debug',               desc: 'Print API responses, no writes' },
    ]},
];

function PipelinesModule() {
    const [status,   setStatus]   = useState(null); // null = not yet loaded
    const [log,      setLog]      = useState([]);
    const [running,  setRunning]  = useState(false);
    const [jobId,    setJobId]    = useState(null);
    const logRef  = useRef(null);
    const esRef   = useRef(null);

    // Load current status on mount
    useEffect(() => {
        fetch(`${API}/pipeline/status`).then(r => r.json()).then(s => {
            setStatus(s);
            setRunning(s.running);
            if (s.id) { setJobId(s.id); setLog(s.lines ?? []); }
            if (s.running) connectStream(s.id);
        });
        return () => esRef.current?.close();
    }, []);

    // Auto-scroll log
    useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
    }, [log]);

    const connectStream = (id) => {
        esRef.current?.close();
        const es = new EventSource(`${API}/pipeline/stream?id=${id}`);
        esRef.current = es;
        es.onmessage = (e) => {
            const line = JSON.parse(e.data);
            if (line.type === 'exit') { setRunning(false); es.close(); }
            setLog(prev => [...prev, line]);
        };
        es.onerror = () => { setRunning(false); es.close(); };
    };

    const run = async (mode) => {
        setLog([]);
        setRunning(true);
        const res = await fetch(`${API}/pipeline/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode }),
        });
        const data = await res.json();
        if (data.error) { setLog([{ type: 'err', text: data.error }]); setRunning(false); return; }
        setJobId(data.id);
        connectStream(data.id);
    };

    const stop = () => fetch(`${API}/pipeline/stop`, { method: 'POST' });

    const lineColor = (type) => {
        if (type === 'err')  return '#ff6b6b';
        if (type === 'exit') return '#8f98a0';
        return '#c6d4df';
    };

    return (
        <div className="flex h-full overflow-hidden">
            {/* Left: run buttons */}
            <div className="w-[240px] shrink-0 flex flex-col border-r border-[#2a475e] overflow-y-auto">
                {PIPELINE_MODES.map(({ platform, color, modes }) => (
                    <div key={platform} className="p-3 border-b border-[#2a475e]">
                        <div className="flex items-center gap-2 mb-2">
                            <span className="w-[3px] h-[13px] rounded-[1px] shrink-0" style={{ background: color }} />
                            <span className="text-[11px] text-white font-medium uppercase tracking-wide">{platform}</span>
                        </div>
                        <div className="flex flex-col gap-1.5">
                            {modes.map(m => (
                                <button key={m.id} onClick={() => run(m.id)} disabled={running}
                                    className={`flex flex-col items-start px-2.5 py-2 rounded-[3px] border text-left transition-colors ${running ? 'opacity-40 cursor-not-allowed border-[#2a475e]' : 'border-[#2a475e] hover:border-[#66c0f4] hover:bg-[#1b2838]'}`}>
                                    <span className="text-[11px] text-white font-medium">{m.label}</span>
                                    <span className="text-[9px] text-[#546270]">{m.desc}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            {/* Right: log */}
            <div className="flex-1 flex flex-col overflow-hidden">
                <div className="flex items-center gap-3 px-4 py-2 border-b border-[#2a475e] shrink-0">
                    <span className="text-[11px] text-[#546270] flex-1">
                        {running ? <span className="text-[#57cbde]">● Running…</span>
                         : log.length ? <span>Done</span>
                         : <span>Select a pipeline to run</span>}
                    </span>
                    {running && (
                        <button onClick={stop} className="text-[10px] text-[#ff6b6b] border border-[#ff6b6b]/40 hover:bg-[#ff6b6b]/10 px-2 py-1 rounded-[2px] transition-colors">
                            Stop
                        </button>
                    )}
                    {log.length > 0 && !running && (
                        <button onClick={() => setLog([])} className="btn-ghost text-[10px]">Clear</button>
                    )}
                </div>
                <div ref={logRef} className="flex-1 overflow-y-auto p-3 font-mono text-[11px] leading-relaxed">
                    {log.map((line, i) => (
                        <div key={i} style={{ color: lineColor(line.type) }}>{line.text}</div>
                    ))}
                </div>
            </div>
        </div>
    );
}

// MODULE: Data Diff

// Parses unified diff lines into side-by-side row pairs
// Returns [{ type: 'hunk'|'same'|'change'|'add'|'del', left, right, leftNo, rightNo }]
function parseSideBySide(lines) {
    const rows = [];
    let leftNo = 0, rightNo = 0;

    // Strip file header lines (diff --git, index, ---, +++)
    const diffLines = lines.filter(l =>
        !l.startsWith('diff ') && !l.startsWith('index ') &&
        !l.startsWith('--- ') && !l.startsWith('+++ ')
    );

    let i = 0;
    while (i < diffLines.length) {
        const line = diffLines[i];
        if (line.startsWith('@@')) {
            const m = line.match(/@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
            if (m) { leftNo = parseInt(m[1]); rightNo = parseInt(m[2]); }
            rows.push({ type: 'hunk', left: line, right: '' });
            i++; continue;
        }

        // Collect a block of removals then additions to pair them
        const dels = [], adds = [];
        while (i < diffLines.length && diffLines[i].startsWith('-')) { dels.push(diffLines[i].slice(1)); i++; }
        while (i < diffLines.length && diffLines[i].startsWith('+')) { adds.push(diffLines[i].slice(1)); i++; }

        if (dels.length || adds.length) {
            const len = Math.max(dels.length, adds.length);
            for (let j = 0; j < len; j++) {
                const hasDel = j < dels.length, hasAdd = j < adds.length;
                rows.push({
                    type:    hasDel && hasAdd ? 'change' : hasDel ? 'del' : 'add',
                    left:    hasDel ? dels[j] : null,
                    right:   hasAdd ? adds[j] : null,
                    leftNo:  hasDel ? leftNo++  : null,
                    rightNo: hasAdd ? rightNo++ : null,
                });
            }
            continue;
        }

        // Context line
        if (line.startsWith(' ') || line === '') {
            rows.push({ type: 'same', left: line.slice(1), right: line.slice(1), leftNo: leftNo++, rightNo: rightNo++ });
        }
        i++;
    }
    return rows;
}

const BG = {
    hunk:   { cell: '#1a2535', line: '#1a2535' },
    same:   { cell: 'transparent', line: 'transparent' },
    del:    { left: 'rgba(255,107,107,0.15)', right: 'rgba(255,107,107,0.04)', leftLine: 'rgba(255,107,107,0.3)', rightLine: 'transparent' },
    add:    { left: 'rgba(87,203,222,0.04)',  right: 'rgba(87,203,222,0.15)', leftLine: 'transparent', rightLine: 'rgba(87,203,222,0.3)' },
    change: { left: 'rgba(255,107,107,0.15)', right: 'rgba(87,203,222,0.15)', leftLine: 'rgba(255,107,107,0.3)', rightLine: 'rgba(87,203,222,0.3)' },
};

const SideBySideRow = ({ row }) => {
    if (row.type === 'hunk') return (
        <tr style={{ background: BG.hunk.cell }}>
            <td colSpan={4} className="px-3 py-0.5 font-mono text-[10px]" style={{ color: '#e5b143' }}>{row.left}</td>
        </tr>
    );
    const bg     = BG[row.type];
    const leftBg = row.type === 'same' ? 'transparent' : (bg.left  ?? bg.cell);
    const rightBg= row.type === 'same' ? 'transparent' : (bg.right ?? bg.cell);
    const leftLn = row.type === 'same' ? 'transparent' : (bg.leftLine  ?? 'transparent');
    const rightLn= row.type === 'same' ? 'transparent' : (bg.rightLine ?? 'transparent');
    return (
        <tr>
            <td className="select-none text-right pr-2 pl-1 font-mono text-[10px] w-[32px] shrink-0" style={{ color: '#546270', background: leftLn, borderRight: '1px solid #2a475e' }}>
                {row.leftNo ?? ''}
            </td>
            <td className="font-mono text-[10px] px-2 whitespace-pre" style={{ color: row.left === null ? '#546270' : '#c6d4df', background: leftBg, borderRight: '1px solid #2a475e', minWidth: 0, maxWidth: '50%', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                {row.left ?? ''}
            </td>
            <td className="select-none text-right pr-2 pl-1 font-mono text-[10px] w-[32px] shrink-0" style={{ color: '#546270', background: rightLn, borderRight: '1px solid #2a475e' }}>
                {row.rightNo ?? ''}
            </td>
            <td className="font-mono text-[10px] px-2 whitespace-pre" style={{ color: row.right === null ? '#546270' : '#c6d4df', background: rightBg, minWidth: 0 }}>
                {row.right ?? ''}
            </td>
        </tr>
    );
};

function DataDiffModule() {
    const [files,    setFiles]    = useState([]);
    const [loading,  setLoading]  = useState(true);
    const [selected, setSelected] = useState(null);

    const load = () => {
        setLoading(true);
        fetch(`${API}/diff`).then(r => r.json()).then(d => {
            setFiles(d.files ?? []);
            setSelected(d.files?.[0] ?? null);
            setLoading(false);
        });
    };

    useEffect(() => { load(); }, []);

    const rows = selected ? parseSideBySide(selected.lines) : [];
    const adds = rows.filter(r => r.type === 'add' || r.type === 'change').length;
    const dels = rows.filter(r => r.type === 'del' || r.type === 'change').length;

    return (
        <div className="flex h-full overflow-hidden">
            {/* File list */}
            <div className="w-[220px] shrink-0 flex flex-col border-r border-[#2a475e]">
                <div className="flex items-center gap-2 px-3 py-2 border-b border-[#2a475e]">
                    <span className="text-[11px] text-[#546270] flex-1">{loading ? 'Loading…' : `${files.length} file${files.length !== 1 ? 's' : ''} changed`}</span>
                    <button onClick={load} className="btn-ghost text-[10px]">↺</button>
                </div>
                <div className="flex-1 overflow-y-auto py-1">
                    {!loading && files.length === 0 && (
                        <div className="text-[11px] text-[#546270] text-center py-8">No changes in data/</div>
                    )}
                    {files.map(f => (
                        <button key={f.file} onClick={() => setSelected(f)}
                            className={`w-full text-left px-3 py-1.5 text-[10px] font-mono transition-colors ${selected?.file === f.file ? 'bg-[#2a475e] text-white' : 'text-[#8f98a0] hover:bg-[#1b2838]'}`}>
                            {f.file.replace('data/', '')}
                        </button>
                    ))}
                </div>
            </div>

            {/* Diff view */}
            <div className="flex-1 flex flex-col overflow-hidden">
                {selected ? (
                    <>
                        <div className="flex items-center gap-3 px-4 py-2 border-b border-[#2a475e] shrink-0">
                            <span className="text-[11px] font-mono text-white flex-1">{selected.file}</span>
                            <span className="text-[10px] text-[#57cbde]">+{adds}</span>
                            <span className="text-[10px] text-[#ff6b6b]">-{dels}</span>
                        </div>
                        <div className="flex-1 overflow-auto">
                            <table className="w-full border-collapse" style={{ tableLayout: 'fixed' }}>
                                <colgroup>
                                    <col style={{ width: 32 }} />
                                    <col style={{ width: '50%' }} />
                                    <col style={{ width: 32 }} />
                                    <col style={{ width: '50%' }} />
                                </colgroup>
                                <tbody>
                                    {rows.map((row, i) => <SideBySideRow key={i} row={row} />)}
                                </tbody>
                            </table>
                        </div>
                    </>
                ) : (
                    !loading && <div className="flex items-center justify-center h-full text-[#546270] text-[11px]">Select a file</div>
                )}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE: Credentials
// ═══════════════════════════════════════════════════════════════════════════════

const CREDENTIAL_FIELDS = [
    { group: 'RetroAchievements', fields: [
        { key: 'RA_USERNAME', label: 'Username',  type: 'text',     hint: 'Your RA username' },
        { key: 'RA_API_KEY',  label: 'API Key',   type: 'password', hint: 'Settings → API Key on retroachievements.org' },
    ]},
    { group: 'Steam', fields: [
        { key: 'STEAM_USER_ID', label: 'User ID',  type: 'text',     hint: '17-digit Steam ID (steamid.io)' },
        { key: 'STEAM_API_KEY', label: 'API Key',  type: 'password', hint: 'steamcommunity.com/dev/apikey' },
    ]},
];

function CredentialsModule() {
    const [values,  setValues]  = useState({});
    const [show,    setShow]    = useState({});
    const [dirty,   setDirty]   = useState(false);
    const [saving,  setSaving]  = useState(false);
    const [saved,   setSaved]   = useState(false);

    useEffect(() => {
        fetch(`${API}/credentials`).then(r => r.json()).then(d => setValues(d));
    }, []);

    const update = (key, val) => { setValues(v => ({ ...v, [key]: val })); setDirty(true); setSaved(false); };
    const toggleShow = (key) => setShow(s => ({ ...s, [key]: !s[key] }));

    const save = async () => {
        setSaving(true);
        await fetch(`${API}/credentials`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(values),
        });
        setSaving(false); setDirty(false); setSaved(true);
    };

    return (
        <div className="flex flex-col h-full">
            <SaveBar dirty={dirty} saving={saving} saved={saved} onSave={save} />
            <div className="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
                {CREDENTIAL_FIELDS.map(({ group, fields }) => (
                    <div key={group}>
                        <SectionHeader color={group === 'Steam' ? '#66c0f4' : '#e5b143'}>{group}</SectionHeader>
                        <div className="flex flex-col gap-3">
                            {fields.map(({ key, label, type, hint }) => (
                                <Field key={key} label={label}>
                                    <div className="relative">
                                        <input
                                            className="input pr-8"
                                            type={type === 'password' && !show[key] ? 'password' : 'text'}
                                            value={values[key] ?? ''}
                                            onChange={e => update(key, e.target.value)}
                                            placeholder={hint}
                                        />
                                        {type === 'password' && (
                                            <button onClick={() => toggleShow(key)}
                                                className="absolute right-2 top-1/2 -translate-y-1/2 text-[#546270] hover:text-[#c6d4df] text-[10px]">
                                                {show[key] ? 'hide' : 'show'}
                                            </button>
                                        )}
                                    </div>
                                </Field>
                            ))}
                        </div>
                    </div>
                ))}
                <div className="text-[10px] text-[#546270] border border-[#2a475e] rounded-[3px] px-3 py-2">
                    Writes to <code className="text-[#66c0f4]">.env</code> in the repo root. This file is gitignored and never deployed.
                </div>
            </div>
        </div>
    );
}

const MODULES = [
    { id: 'config',      label: 'Site Config',  icon: '⚙️',  group: 'General',          component: SiteConfigModule },
    { id: 'credentials', label: 'Credentials',  icon: '🔑',  group: 'General',          component: CredentialsModule },
    { id: 'pipelines',   label: 'Pipelines',    icon: '▶',   group: 'General',          component: PipelinesModule },
    { id: 'data-diff',   label: 'Data Diff',    icon: '±',   group: 'General',          component: DataDiffModule },
    { id: 'ra-guides',   label: 'Guides',       icon: '📖',  group: 'RetroAchievements', component: RAGuidesModule },
    { id: 'ra-series',   label: 'Series',       icon: '🗂️',  group: 'RetroAchievements', component: RASeriesModule },
];

const GROUPS = [...new Set(MODULES.map(m => m.group))];

// ═══════════════════════════════════════════════════════════════════════════════
// App shell
// ═══════════════════════════════════════════════════════════════════════════════

export default function App() {
    const getIdFromHash = () => {
        const hash = location.hash.slice(1);
        return MODULES.find(m => m.id === hash) ? hash : MODULES[0].id;
    };
    const [activeId,      setActiveId]      = useState(getIdFromHash);
    const [error,         setError]         = useState(null);
    const [serverStatus,  setServerStatus]  = useState('online'); // 'online' | 'stopping' | 'restarting' | 'offline'

    useEffect(() => {
        const onHash = () => setActiveId(getIdFromHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const stopServer = async () => {
        if (!confirm('Stop the admin server?')) return;
        setServerStatus('stopping');
        await fetch(`${API}/server/stop`, { method: 'POST' }).catch(() => {});
        setServerStatus('offline');
    };

    const restartServer = async () => {
        setServerStatus('restarting');
        await fetch(`${API}/server/restart`, { method: 'POST' }).catch(() => {});
        // Poll until back up
        const poll = setInterval(async () => {
            try {
                const r = await fetch(`${API}/health`);
                if (r.ok) { clearInterval(poll); setServerStatus('online'); }
            } catch {}
        }, 500);
    };

    useEffect(() => {
        fetch(`${API}/data?file=data/hub/config.json`)
            .catch(() => setError('Could not connect to admin server. Is it running?'));
    }, []);

    const active = MODULES.find(m => m.id === activeId);
    const ActiveComponent = active?.component;

    if (error) return (
        <div className="flex items-center justify-center h-screen text-center px-6">
            <div>
                <div className="text-[#ff6b6b] text-[14px] font-medium mb-2">Connection error</div>
                <div className="text-[#8f98a0] text-[12px] mb-3">{error}</div>
                <code className="text-[#66c0f4] text-[11px]">npm run admin</code>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen overflow-hidden">
            {/* Sidebar nav */}
            <div className="w-[200px] shrink-0 flex flex-col border-r border-[#2a475e] bg-[#1b2838]">
                <div className="px-4 py-3 border-b border-[#2a475e]">
                    <div className="text-[13px] text-white font-medium tracking-wide">Admin</div>
                    <div className="text-[10px] text-[#546270]">gaming-profile</div>
                </div>
                <nav className="flex-1 overflow-y-auto py-2 min-h-0">
                    {GROUPS.map(group => (
                        <div key={group} className="mb-2">
                            <div className="px-3 py-1 text-[9px] text-[#546270] uppercase tracking-[0.1em] font-semibold">{group}</div>
                            {MODULES.filter(m => m.group === group).map(m => (
                                <button key={m.id} onClick={() => { location.hash = m.id; }}
                                    className={`w-full flex items-center gap-2 px-3 py-1.5 text-left text-[11px] transition-colors rounded-[2px] mx-1 ${activeId === m.id ? 'bg-[#2a475e] text-white' : 'text-[#8f98a0] hover:text-white hover:bg-[#202d39]'}`}
                                    style={{ width: 'calc(100% - 8px)' }}>
                                    <span>{m.icon}</span>{m.label}
                                </button>
                            ))}
                        </div>
                    ))}
                </nav>
                {/* Server controls */}
                <div className="px-3 py-2 border-t border-[#2a475e] flex flex-col gap-1.5">
                    {serverStatus === 'offline' && (
                        <div className="text-[10px] text-[#ff6b6b] text-center py-1">Server stopped</div>
                    )}
                    {serverStatus === 'restarting' && (
                        <div className="text-[10px] text-[#e5b143] text-center py-1">Restarting…</div>
                    )}
                    {(serverStatus === 'online' || serverStatus === 'stopping') && (
                        <div className="flex gap-1.5">
                            <button onClick={restartServer} disabled={serverStatus !== 'online'}
                                className="flex-1 py-1 text-[10px] rounded-[2px] border border-[#2a475e] text-[#8f98a0] hover:text-white hover:border-[#66c0f4] transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                                Restart
                            </button>
                            <button onClick={stopServer} disabled={serverStatus !== 'online'}
                                className="flex-1 py-1 text-[10px] rounded-[2px] border border-[#2a475e] text-[#8f98a0] hover:text-[#ff6b6b] hover:border-[#ff6b6b]/50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                                Stop
                            </button>
                        </div>
                    )}
                </div>
            </div>

            {/* Main content */}
            <div className="flex-1 flex flex-col overflow-hidden">
                {/* Page title */}
                <div className="px-5 py-3 border-b border-[#2a475e] shrink-0">
                    <div className="text-[13px] text-white font-medium">{active?.icon} {active?.label}</div>
                    <div className="text-[10px] text-[#546270]">{active?.group}</div>
                </div>
                <div className="flex-1 overflow-hidden">
                    {ActiveComponent && <ActiveComponent />}
                </div>
            </div>
        </div>
    );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
